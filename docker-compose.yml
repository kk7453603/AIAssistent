services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p password 'RETURN 1;' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - storage_data:/data/storage
      - openwebui_data:/app/backend/data
      - ${OBSIDIAN_VAULTS_HOST_PATH:-./obsidian_vaults}:/vaults
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    ports:
      - "${WORKER_METRICS_PORT:-9090}:${WORKER_METRICS_PORT:-9090}"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - storage_data:/data/storage
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus/rules:/etc/prometheus/rules:ro
    depends_on:
      api:
        condition: service_started
      worker:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

  grafana:
    image: grafana/grafana:12.4.1
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-ChangeMeGrafana123!}"
    volumes:
      - ./deploy/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

  openwebui:
    build:
      context: .
      dockerfile: deploy/openwebui/Dockerfile
    ports:
      - "3000:8080"
    environment:
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URLS: "http://api:8080/v1"
      OPENAI_API_KEYS: "${OPENAI_COMPAT_API_KEY:-}"
      ENABLE_OLLAMA_API: "true"
      OLLAMA_BASE_URLS: "http://ollama:11434"
      WEBUI_ADMIN_EMAIL: "${OPENWEBUI_ADMIN_EMAIL:-admin@example.com}"
      WEBUI_ADMIN_PASSWORD: "${OPENWEBUI_ADMIN_PASSWORD:-ChangeMeStrongPass123!}"
      WEBUI_ADMIN_NAME: "${OPENWEBUI_ADMIN_NAME:-Admin}"
      WEBUI_SECRET_KEY: "${OPENWEBUI_SECRET_KEY:-replace-with-long-random-secret}"
      WEBUI_AUTH_COOKIE_SECURE: "false"
      WEBUI_AUTH_COOKIE_SAME_SITE: "lax"
      ASSISTANT_OBSIDIAN_CONFIG_PATH: "/app/backend/data/assistant/obsidian_vaults.json"
      ASSISTANT_OBSIDIAN_STATE_DIR: "/app/backend/data/assistant/obsidian_state"
      ASSISTANT_OBSIDIAN_VAULTS_ROOT: "/vaults"
      ASSISTANT_OBSIDIAN_DEFAULT_INTERVAL_MINUTES: "${ASSISTANT_OBSIDIAN_DEFAULT_INTERVAL_MINUTES:-15}"
      ENABLE_DIRECT_CONNECTIONS: "true"
    depends_on:
      api:
        condition: service_started
      ollama:
        condition: service_healthy
    volumes:
      - openwebui_data:/app/backend/data
      - ${OBSIDIAN_VAULTS_HOST_PATH:-./obsidian_vaults}:/vaults

  openwebui-pipe-bootstrap:
    image: alpine:3.20
    command: >
      sh -c "apk add --no-cache curl jq >/dev/null && sh /bootstrap/bootstrap-function.sh"
    environment:
      OPENWEBUI_URL: "http://openwebui:8080"
      OPENWEBUI_ADMIN_EMAIL: "${OPENWEBUI_ADMIN_EMAIL:-admin@example.com}"
      OPENWEBUI_ADMIN_PASSWORD: "${OPENWEBUI_ADMIN_PASSWORD:-ChangeMeStrongPass123!}"
      FUNCTION_ID: "paa_rag_pipe"
      FUNCTION_NAME: "Personal AI Assistant"
      FUNCTION_TYPE: "pipe"
      FUNCTION_FILE_PATH: "/function/paa_rag_pipe.py"
    depends_on:
      openwebui:
        condition: service_started
      api:
        condition: service_started
    volumes:
      - ./scripts/openwebui/bootstrap-function.sh:/bootstrap/bootstrap-function.sh:ro
      - ./deploy/openwebui/functions/paa_rag_pipe.py:/function/paa_rag_pipe.py:ro
    restart: "no"

  openwebui-tool-bootstrap-obsidian:
    image: alpine:3.20
    command: >
      sh -c "apk add --no-cache curl jq >/dev/null && sh /bootstrap/bootstrap-tool.sh"
    environment:
      OPENWEBUI_URL: "http://openwebui:8080"
      OPENWEBUI_ADMIN_EMAIL: "${OPENWEBUI_ADMIN_EMAIL:-admin@example.com}"
      OPENWEBUI_ADMIN_PASSWORD: "${OPENWEBUI_ADMIN_PASSWORD:-ChangeMeStrongPass123!}"
      OPENWEBUI_TOOL_ID: "assistant_obsidian_vaults"
      OPENWEBUI_TOOL_NAME: "Assistant Obsidian Vaults"
      OPENWEBUI_TOOL_DESCRIPTION: "Manage Obsidian vaults for automatic sync."
      TOOL_FILE_PATH: "/tool/assistant_obsidian_vaults.py"
    depends_on:
      openwebui:
        condition: service_started
      api:
        condition: service_started
    volumes:
      - ./scripts/openwebui/bootstrap-tool.sh:/bootstrap/bootstrap-tool.sh:ro
      - ./deploy/openwebui/tools/assistant_obsidian_vaults.py:/tool/assistant_obsidian_vaults.py:ro
    restart: "no"

  obsidian-sync:
    image: alpine:3.20
    command: >
      sh -c "apk add --no-cache bash curl jq coreutils findutils >/dev/null && /sync/auto_sync.sh"
    environment:
      ASSISTANT_API_URL: "http://api:8080"
      ASSISTANT_OBSIDIAN_CONFIG_PATH: "/app/backend/data/assistant/obsidian_vaults.json"
      ASSISTANT_OBSIDIAN_STATE_DIR: "/app/backend/data/assistant/obsidian_state"
      ASSISTANT_OBSIDIAN_DEFAULT_INTERVAL_MINUTES: "${ASSISTANT_OBSIDIAN_DEFAULT_INTERVAL_MINUTES:-15}"
      ASSISTANT_OBSIDIAN_POLL_SECONDS: "${ASSISTANT_OBSIDIAN_POLL_SECONDS:-30}"
      ASSISTANT_OBSIDIAN_WAIT_READY: "${ASSISTANT_OBSIDIAN_WAIT_READY:-true}"
      ASSISTANT_OBSIDIAN_SYNC_SCRIPT: "/sync/sync_vault.sh"
    depends_on:
      api:
        condition: service_started
    volumes:
      - openwebui_data:/app/backend/data
      - ${OBSIDIAN_VAULTS_HOST_PATH:-./obsidian_vaults}:/vaults
      - ./scripts/obsidian/auto_sync.sh:/sync/auto_sync.sh:ro
      - ./scripts/obsidian/sync_vault.sh:/sync/sync_vault.sh:ro

  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: "http://searxng:8080/"
      SEARXNG_LIMITER: "false"
    volumes:
      - ./deploy/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./deploy/searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    ports:
      - "8888:8080"

  mcp-filesystem:
    build:
      context: deploy/mcp-servers/filesystem
      dockerfile: Dockerfile
    environment:
      ALLOWED_DIRS: "/allowed/vaults"
      PORT: "3000"
      MCP_PATH: "/mcp"
    volumes:
      - ${OBSIDIAN_VAULTS_HOST_PATH:-./obsidian_vaults}:/allowed/vaults
      # Uncomment to also expose a general workspace directory:
      # - ${MCP_WORKSPACE_HOST_PATH:-./workspace}:/allowed/workspace
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  mcp-code-runner:
    build:
      context: deploy/mcp-servers/code-runner
      dockerfile: Dockerfile
    environment:
      PORT: "3001"
      MCP_PATH: "/mcp"
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: "1.0"
    tmpfs:
      - /tmp:size=64m
    restart: unless-stopped

  mcp-github:
    build:
      context: deploy/mcp-servers/github
      dockerfile: Dockerfile
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN:-}"
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  minio_data:
  storage_data:
  openwebui_data:
  grafana_data:
  neo4j_data:
